name: sabaidee_wallet
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

# ✅ config ຢູ່ລະດັບ root — ບໍ່ແມ່ນໃນ dependencies
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"    # ໃສ່ navy ຄືກັບ background icon
  adaptive_icon_foreground: "assets/images/app_icon.png"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.4
  app_links: ^6.4.1
  url_launcher: ^6.3.2
  flutter_secure_storage: ^10.0.0
  mobile_scanner: ^7.2.0
  image_picker: ^1.2.1
  qr_flutter: ^4.1.0
  intl: ^0.20.2
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4  # ✅ dev only

flutter:
  uses-material-design: true

  assets:
    - assets/images/wallet_animation.gif
    - assets/images/google-logo.png
    - assets/images/default_avatar.png
    - assets/images/app_icon.png